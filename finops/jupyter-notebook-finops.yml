schema: https://www.finops.org/framework/
alignedWith:
  framework: FinOps Foundation Framework
  frameworkUrl: https://www.finops.org/framework/
  dataSpec: FOCUS
  dataSpecVersion: '1.3'
  dataSpecUrl: https://focus.finops.org/focus-specification/v1-3/
provider: Jupyter Notebook
providerId: jupyter-notebook
publisherName: Project Jupyter
serviceCategory: Open-Source Data Science / Notebooks
created: '2026-05-04'
modified: '2026-05-05'
reconciled: true
tags:
  - Data Science
  - Interactive Computing
  - Jupyter
  - Notebooks
  - FinOps
  - FOCUS
  - Open Source
description: FOCUS-aligned FinOps scaffold for Project Jupyter. The software itself has no
  license cost; the FinOps surface is the underlying compute / storage the operator pays
  for to run kernels, servers, and JupyterHub.
sources:
  - https://jupyter.org/about
  - https://jupyterhub.readthedocs.io/
  - https://www.finops.org/framework/
  - https://focus.finops.org/focus-specification/v1-3/
billingModel:
  pricingCategory: Open Source (no project fees)
  billingFrequency: Not Applicable
  billingCurrency: USD
  chargeCategories:
    - Usage
focusColumns:
  ServiceName: Jupyter Notebook
  ServiceCategory: Open-Source Data Science / Notebooks
  ProviderName: Project Jupyter
  PublisherName: Project Jupyter
  InvoiceIssuerName: Not Applicable (open source)
  BillingCurrency: USD
meters:
  - name: kernel_runtime_hours
    unit: instance-hour
    aggregation: sum
    dimensions:
      - kernel_type
      - user
      - hub
  - name: notebook_storage
    unit: GB-month
    aggregation: max
    dimensions:
      - user
      - hub
  - name: hub_active_users
    unit: user
    aggregation: max
    dimensions:
      - hub
principles:
  - name: Visibility
    description: Project Jupyter has no first-party billing; visibility comes from the
      underlying cloud / on-prem cost data and JupyterHub usage logs (PrometheusMetrics
      exporter, named-server / named-user telemetry).
  - name: Allocation
    description: Allocate the underlying cost by JupyterHub username, named-server, or
      Kubernetes namespace; tag cloud resources with hub and tenant labels.
  - name: Optimization
    description: Idle-server culling (jupyterhub-idle-culler), right-sized kernel images,
      shared CPU/GPU pools, and sleep-on-idle drastically reduce notebook compute spend.
  - name: Accountability
    description: A platform / data-platform team typically owns the JupyterHub deployment;
      pair with departmental owners who fund the underlying compute.
maintainers:
