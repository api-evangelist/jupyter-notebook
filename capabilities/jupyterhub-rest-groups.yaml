        description: Jupyter Notebook List groups
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: offset
          in: query
          type: integer
          description: Offset for pagination.
        - name: limit
          in: query
          type: integer
          description: Maximum number of groups to return.
