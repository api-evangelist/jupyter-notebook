        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: name
          in: path
          type: string
          description: Group name.
          required: true
    - name: groups-name-properties
      path: /groups/{name}/properties
      operations:
      - name: setgroupproperties
        method: PUT
        description: Jupyter Notebook Set group properties
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: name
          in: path
          type: string
          description: Group name.
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: groups-name-users
      path: /groups/{name}/users
      operations:
      - name: addgroupusers
        method: POST
        description: Jupyter Notebook Add users to a group
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
