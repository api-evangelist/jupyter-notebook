        description: Jupyter Notebook Get group details
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: name
          in: path
          type: string
          description: Group name.
          required: true
      - name: creategroup
        method: POST
        description: Jupyter Notebook Create a group
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
