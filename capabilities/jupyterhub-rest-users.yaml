      - name: listusers
        method: GET
        description: Jupyter Notebook List users
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: state
          in: query
          type: string
          description: Filter users by server state. Can be 'active', 'inactive', or 'ready'.
        - name: offset
          in: query
          type: integer
          description: Offset for pagination.
        - name: limit
          in: query
          type: integer
          description: Maximum number of users to return.
        - name: include_stopped_servers
          in: query
          type: boolean
          description: Include stopped server information in results.
      - name: createusers
        method: POST
        description: Jupyter Notebook Create multiple users
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
