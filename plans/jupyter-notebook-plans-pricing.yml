specification: API Commons Plans
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/Plans
provider: Jupyter Notebook
providerId: jupyter-notebook
created: '2026-05-04'
modified: '2026-05-05'
reconciled: true
tags:
  - Data Science
  - Interactive Computing
  - Jupyter
  - Machine Learning
  - Notebooks
  - Python
description: Project Jupyter (jupyter / jupyter_server / nbclassic / notebook) is a free
  open-source project distributed under the modified BSD (3-Clause) license. There is no
  commercial price list and no metered API tier. Cost arises only from the host environment
  the user runs the kernel and server on. Hosted Jupyter offerings exist on third-party
  platforms (Binder, JupyterHub deployments, AWS / GCP / Azure managed notebooks); their
  pricing is out of scope here.
sources:
  - https://jupyter.org/about
  - https://jupyter.org/governance/
  - https://github.com/jupyter/notebook/blob/main/LICENSE
plans:
  - id: jupyter-notebook-open-source
    name: Open Source
    type: freemium
    description: Jupyter Notebook software is free to download, run, modify, and redistribute
      under the modified BSD license. No license fees, no usage caps imposed by the project,
      and no first-party paid tier.
    entries:
      - label: Software License
        name: software_license
        type: flat
        metric: license
        limit: -1
        timeFrame: usage
        geo: global
        unit: 1
        price: '0.00'
        userMultiplied: false
    elements:
      - name: Modified BSD (3-Clause) License
      - name: Self-hosted - user owns infrastructure cost
      - name: Community support via Discourse, GitHub, Stack Overflow
      - name: Optional commercial support from third-party vendors
maintainers:
  - FN: Kin Lane
    email: kin@apievangelist.com
